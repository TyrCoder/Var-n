<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Account Restricted — Varón</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@500&display=swap" rel="stylesheet">
    <style>
      :root {
        --bg: #f3f4f6;
        --surface: #ffffff;
        --line: #e5e7eb;
        --text: #0a0a0a;
        --muted: #6b7280;
        --accent: #0a0a0a;
        --shadow: 0 18px 40px rgba(15, 23, 42, 0.08);
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: linear-gradient(135deg, #f9fafb 0%, #eef2ff 60%, #f3f4f6 100%);
        color: var(--text);
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .card {
        width: min(720px, 100%);
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: 18px;
        box-shadow: var(--shadow);
        padding: 22px;
      }

      h1 {
        font-family: 'Playfair Display', 'Inter', serif;
        margin: 0;
        font-size: 26px;
        letter-spacing: -0.02em;
      }

      .subtitle {
        margin-top: 6px;
        color: var(--muted);
        font-size: 14px;
      }

      .details {
        margin-top: 14px;
        border-top: 1px solid var(--line);
        padding-top: 14px;
        display: grid;
        gap: 10px;
      }

      .row {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        align-items: baseline;
      }

      .k {
        font-size: 12px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--muted);
      }

      .v {
        font-weight: 600;
      }

      .actions {
        margin-top: 18px;
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }

      .btn {
        appearance: none;
        border: 1px solid var(--line);
        background: var(--accent);
        color: #fff;
        padding: 10px 14px;
        border-radius: 12px;
        font-weight: 600;
        cursor: pointer;
        text-decoration: none;
      }

      .btn.secondary {
        background: #fff;
        color: var(--text);
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Account Restricted</h1>
      <div class="subtitle">Your account has been temporarily restricted. Access to system features is limited.</div>

      <div class="details">
        <div class="row">
          <div class="k">Reason</div>
          <div class="v">{{ reason or '—' }}</div>
        </div>
        <div class="row">
          <div class="k">Restriction Until</div>
          <div class="v">{{ restriction_until or 'Until further notice' }}</div>
        </div>
      </div>

      <div class="actions">
        <a class="btn secondary" href="/logout">Logout</a>
        <a class="btn" href="/">Home</a>
      </div>
    </div>
  </body>
</html>
